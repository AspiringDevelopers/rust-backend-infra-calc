version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: touchcalc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: touchcalc
    volumes:
      - mongodb_data:/data/db
    networks:
      - touchcalc-network

  mysql:
    image: mysql:8.0
    container_name: touchcalc-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: touchcalc
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - touchcalc-network
    command: --default-authentication-plugin=mysql_native_password

  minio:
    image: minio/minio:latest
    container_name: touchcalc-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - touchcalc-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  app:
    build: .
    container_name: touchcalc-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - COOKIE_SECRET=${COOKIE_SECRET}
      - STORAGE_BACKEND=${STORAGE_BACKEND}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DATABASE=touchcalc
      - MYSQL_DSN=root:password@tcp(mysql:3306)/touchcalc
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=touchcalc-storage
      - MINIO_SSL=false
      - FROM_EMAIL=${FROM_EMAIL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - mysql
      - minio
    networks:
      - touchcalc-network
    volumes:
      - ./web:/app/web

volumes:
  mongodb_data:
  mysql_data:
  minio_data:

networks:
  touchcalc-network:
    driver: bridge
